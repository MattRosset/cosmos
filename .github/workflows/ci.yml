name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm --filter @cosmos/e2e exec playwright install --with-deps chromium webkit

      - name: Build web
        run: pnpm --filter @cosmos/web build

      # ── Phase 2 acceptance gate (TASK-030, §6 M2) ───────────────────────────
      # The re-asserted gates are listed explicitly here so a skipped or cached
      # unit job cannot mask them in the milestone-closing run.

      # Orbit accuracy (TASK-021): the 8-planet JPL/Horizons gate.
      - name: Orbit accuracy gate (pack-solar)
        run: pnpm --filter @cosmos/pack-solar test

      # Time controls per §5.4 (TASK-019): epoch clock + acceleration precision.
      - name: Time controls gate (sim-time §5.4)
        run: pnpm --filter @cosmos/sim-time test

      # Phase 1 acceptance (TASK-017, §6): performance >= 0.85 and Time-to-Interactive
      # <= 4000 ms (the "cable connection" cold-load budget, modeled by Lighthouse's
      # desktop throttling profile). Runs against the built dist, never the dev server.
      - name: Lighthouse (performance + cold-load budget)
        run: pnpm lighthouse

      # Full e2e suite, incl. the TASK-030 context-switch gate (ctxswitch.spec.ts):
      # smoke, flythrough, m1, m2, jitter, ctxswitch, context-loss.
      - name: Run E2E tests
        run: pnpm --filter @cosmos/e2e test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/

      - name: Check bundle size
        run: pnpm check:bundle
