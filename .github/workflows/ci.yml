name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm --filter @cosmos/e2e exec playwright install --with-deps chromium webkit firefox

      - name: Build web
        run: pnpm --filter @cosmos/web build

      # ── Phase 2 acceptance gate (TASK-030, §6 M2) ───────────────────────────
      # The re-asserted gates are listed explicitly here so a skipped or cached
      # unit job cannot mask them in the milestone-closing run.

      # Orbit accuracy (TASK-021): the 8-planet JPL/Horizons gate.
      - name: Orbit accuracy gate (pack-solar)
        run: pnpm --filter @cosmos/pack-solar test

      # Time controls per §5.4 (TASK-019): epoch clock + acceleration precision.
      - name: Time controls gate (sim-time §5.4)
        run: pnpm --filter @cosmos/sim-time test

      # ── Phase 3 acceptance gate (TASK-041, §6 M3) ───────────────────────────
      # Streaming/procgen/octree determinism, named explicitly so a skipped or
      # cached unit job cannot mask them in the milestone-closing run.
      - name: Procgen determinism gate (§5.6)
        run: pnpm --filter @cosmos/procgen test

      - name: Octree pack determinism gate (§5.7)
        run: pnpm --filter @cosmos/pack-octree test

      - name: Streaming LOD/evict gate (§5.8)
        run: pnpm --filter @cosmos/streaming test

      # Lighthouse a11y/SEO/best-practices report (informational only — see
      # boot-perf.spec.ts below for why performance is no longer gated here).
      # continue-on-error: under no-GPU CPU-capped CI, Lighthouse's own trace
      # collection sometimes crashes the renderer tab outright (TARGET_CRASHED)
      # independent of the app; it must never block the pipeline.
      - name: Lighthouse (informational report)
        run: pnpm lighthouse
        continue-on-error: true

      # Phase 1 acceptance (TASK-017, §6): cold-load main-thread budget — replaces
      # the old Lighthouse performance/TTI gate. That gate reported a 0.46 score /
      # 44s TTI in CI while the same build, driven directly (no Lighthouse trace
      # overhead), showed zero >50ms frames. Lighthouse's simulated-throttling
      # model doesn't compose with an already CPU-capped runner — this measures
      # the real page with a PerformanceObserver instead (boot-perf.spec.ts).
      - name: Cold-boot perf gate (§5.8 / TASK-017)
        run: pnpm --filter @cosmos/e2e exec playwright test boot-perf --project=chromium

      # Full e2e suite across the chromium + webkit + firefox matrix, incl. the
      # TASK-030 context-switch gate (ctxswitch) and the TASK-041 Phase 3 gates
      # (flythrough3 perf on all three projects, soak3 memory plateau on chromium):
      # smoke, flythrough, m1, m2, m3, jitter, ctxswitch, flythrough3, soak3,
      # context-loss.
      #
      # xvfb-run: headless Firefox on Linux can't negotiate any GL context
      # (WebGL2 *and* WebGL1 both fail with FEATURE_FAILURE_WEBGL_EXHAUSTED_DRIVERS)
      # without an X server to glxtest against, even with software rendering. A
      # virtual X server fixes it; Chromium and WebKit don't need it but are
      # unaffected by running under one.
      # --grep-invert @perf: the blocking gate runs only DETERMINISTIC specs
      # (correctness + work-budget caps: in-flight/draw-calls/points, switch
      # sequences, errors). Wall-clock perf specs (@perf) are excluded — on a
      # CPU-capped SwiftShader runner their frame-time numbers measure the runner,
      # not the code. Run those on the reference machine via `pnpm test:perf`.
      - name: Run E2E tests (deterministic gate)
        run: xvfb-run -a pnpm --filter @cosmos/e2e exec playwright test --grep-invert @perf

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/

      - name: Check bundle size
        run: pnpm check:bundle
