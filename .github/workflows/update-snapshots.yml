name: Update E2E snapshots

on:
  workflow_dispatch:

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm --filter @cosmos/e2e exec playwright install --with-deps chromium webkit

      - name: Build web
        run: pnpm --filter @cosmos/web build

      - name: Update snapshots
        run: pnpm --filter @cosmos/e2e exec playwright test --update-snapshots

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/tests/__screenshots__/
          git diff --cached --quiet || git commit -m "fix(e2e): update visual baselines [skip ci]"
          git push
